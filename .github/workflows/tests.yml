name: Tests

on:
  pull_request:
    paths-ignore:
      - 'wordpress-plugin/**'
  push:
    branches: [main]
    paths-ignore:
      - 'wordpress-plugin/**'

permissions:
  contents: read

jobs:
  pint:
    name: Pint (code style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      # bootstrap/cache is gitignored, so it's absent on a fresh checkout;
      # composer's post-autoload-dump (package:discover) needs it to exist.
      - name: Create runtime directories
        run: mkdir -p bootstrap/cache
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Check code style
        run: ./vendor/bin/pint --test

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, gd, exif, zip, bcmath, intl, pdo_sqlite, sqlite3
          coverage: pcov
          tools: composer
      # These runtime dirs are gitignored, so they're absent on a fresh checkout:
      # bootstrap/cache (package:discover), storage/framework/views (Blade compile),
      # storage/logs (logging). Create them before composer install + tests run.
      - name: Create runtime directories
        run: mkdir -p bootstrap/cache storage/framework/{cache,sessions,views,testing} storage/logs
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Node dependencies
        run: npm ci
      # Feature tests render Blade views containing @vite, which throws without a build manifest.
      - name: Build front-end assets
        run: npm run build
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
      # Tests use the in-memory SQLite + array drivers configured in phpunit.xml.
      # --coverage prints the per-file summary (pcov). Once a baseline is known,
      # add --min=NN here to enforce a coverage floor.
      - name: Run tests
        run: |
          php artisan config:clear
          php artisan test --coverage
