<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 26" width="44" height="26">
  <g fill="none">
    <!-- Tail fin -->
    <path d="M38,13 L44,5 L42,13 L44,21 Z" fill="#d4766a" stroke="#b05a50" stroke-width="0.5"/>
    <!-- Body -->
    <ellipse cx="22" cy="13" rx="18" ry="9.5" fill="#e8887a" stroke="#c06858" stroke-width="0.8"/>
    <!-- Belly highlight -->
    <ellipse cx="20" cy="16" rx="13" ry="5" fill="#f0c8c0" opacity="0.6"/>
    <!-- Dark back -->
    <path d="M6,9 Q14,4 28,5 Q36,6 38,10" fill="#a05848" opacity="0.35"/>
    <!-- Dorsal fin -->
    <path d="M18,4 L23,1 L25,5" fill="#d4766a" stroke="#b05a50" stroke-width="0.5"/>
    <!-- Spots -->
    <circle cx="16" cy="10" r="1" fill="#a05040" opacity="0.4"/>
    <circle cx="22" cy="8" r="0.8" fill="#a05040" opacity="0.35"/>
    <circle cx="28" cy="10" r="0.9" fill="#a05040" opacity="0.3"/>
    <circle cx="25" cy="15" r="0.7" fill="#a05040" opacity="0.25"/>
    <!-- Eye -->
    <circle cx="9" cy="11" r="2.2" fill="white" stroke="#555" stroke-width="0.5"/>
    <circle cx="8.3" cy="10.8" r="1" fill="#222"/>
    <!-- Mouth -->
    <path d="M4,13 Q5.5,14.5 4.5,15.5" stroke="#905040" stroke-width="0.6" fill="none"/>
    <!-- Gill line -->
    <path d="M13,8 Q14,13 13,18" stroke="#c06858" stroke-width="0.6" fill="none" opacity="0.5"/>
  </g>
</svg>
