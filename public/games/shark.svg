<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -8 110 52" width="130" height="52">
  <!-- Tail fin — wider asymmetric crescent, upper lobe larger -->
  <path d="M92,20 Q90,12 100,2 Q94,14 96,20 Q94,26 100,38 Q90,28 92,20 Z" fill="#4e6a84" stroke="#3e5a74" stroke-width="0.7"/>

  <!-- Body — sleek fusiform, flat top, curved belly -->
  <path d="M4,20 Q4,10 20,8 L54,8 Q74,9 84,15 L92,20 L84,25 Q74,32 54,33 L20,33 Q4,31 4,20 Z" fill="#6e849c" stroke="#3e5a74" stroke-width="1"/>

  <!-- Body top highlight -->
  <path d="M6,16 Q14,8 22,8.5 L54,8.5 Q72,10 82,16" fill="#8a9eb4" opacity="0.4"/>

  <!-- Belly — lighter underside -->
  <path d="M6,24 Q12,30 21,33 L58,33 Q76,31 82,25 L72,26 Q46,34 18,24 Z" fill="#d0c8c0" opacity="0.65"/>

  <!-- Dorsal fin — large, prominent, swept back -->
  <path d="M32,9 L46,-6 L50,9" fill="#4e6a84" stroke="#3e5a74" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Small rear dorsal -->
  <path d="M70,12 L75,6 L76,12" fill="#4e6a84" stroke="#3e5a74" stroke-width="0.5"/>

  <!-- Pectoral fin — large, angled down and back -->
  <path d="M26,29 L24,40 L36,33" fill="#4e6a84" stroke="#3e5a74" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Gill slits -->
  <line x1="24" y1="14" x2="24" y2="27" stroke="#3e5a74" stroke-width="0.7" opacity="0.45"/>
  <line x1="27" y1="13.5" x2="27" y2="27.5" stroke="#3e5a74" stroke-width="0.6" opacity="0.35"/>
  <line x1="30" y1="13" x2="30" y2="28" stroke="#3e5a74" stroke-width="0.5" opacity="0.25"/>

  <!-- Mouth interior — dark gap -->
  <path d="M4,16 Q10,22 19,21 L18,26 Q10,26.5 4,24 Z" fill="#1a0808" opacity="0.85"/>

  <!-- === LOWER JAW — animated via CSS === -->
  <g class="shark-jaw">
    <!-- Lower jaw shape -->
    <path d="M4,26 Q10,25 18,26 Q19,28 6,27.5 Q1,26 4,24 Z" fill="#c0b8b0" stroke="#3e5a74" stroke-width="0.5"/>
    <!-- Lower teeth — cartoon zigzag -->
    <path d="M4,25.2 L6,19 L9,24.5 L11,21 L13,24.5 L15,22 L17,24.5" fill="white" stroke="#ccc" stroke-width="0.4" stroke-linejoin="round"/>
  </g>

  <!-- Eye — solid black with glint -->
  <circle cx="14" cy="15" r="2.5" fill="#1a1a2e" stroke="#111" stroke-width="0.5"/>
  <!-- Glint -->
  <circle cx="14.6" cy="14" r="0.55" fill="white" opacity="0.75"/>
</svg>
