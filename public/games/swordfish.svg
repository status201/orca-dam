<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -2 140 36" width="150" height="48">
  <!-- Tail fin — deep forked crescent -->
  <path d="M90,16 Q89,11 96,4 Q90,13 93,16 Q90,19 96,28 Q89,21 90,16 Z" fill="#4a6a8a" stroke="#2e4a66" stroke-width="0.7"/>

  <!-- Body — long sleek torpedo shape -->
  <path d="M2,16 Q2,9 16,7 L52,7 Q72,8 82,13 L90,16 L82,19 Q72,24 52,25 L16,25 Q2,23 2,16 Z" fill="#5a7a9a" stroke="#2e4a66" stroke-width="1"/>
  <!-- Body top highlight -->
  <path d="M4,13 Q10,7 18,7.5 L52,7.5 Q70,9 80,14" fill="#7a9ab8" opacity="0.4"/>

  <!-- Belly — lighter underside -->
  <path d="M4,20 Q8,24 16,25 L55,25 Q74,23 80,19 L70,22 Q45,26 18,20 Z" fill="#c8d4e0" opacity="0.65"/>

  <!-- Dark back stripe -->
  <path d="M8,11 Q20,5 50,7 Q70,8 82,13" fill="#3a5a78" opacity="0.3"/>

  <!-- Dorsal fin — tall sail-like -->
  <path d="M28,8 L38,0 L40,8" fill="#4a6a8a" stroke="#2e4a66" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- Small rear dorsal -->
  <path d="M65,9 L68,4 L70,9" fill="#4a6a8a" stroke="#2e4a66" stroke-width="0.5"/>

  <!-- Pectoral fin -->
  <path d="M26,22 L24,30 L34,26" fill="#4a6a8a" stroke="#2e4a66" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Anal fin -->
  <path d="M62,23 L60,28 L66,24" fill="#4a6a8a" stroke="#2e4a66" stroke-width="0.5"/>

  <!-- Sword/bill — long prominent extension -->
  <path d="M2,15.2 L-14,14.8 L-28,15.2 L-38,16 L-28,16.8 L-14,17.2 L2,16.8 Z" fill="#8aa0b4" stroke="#4a6a8a" stroke-width="0.6"/>
  <!-- Bill center ridge -->
  <line x1="-36" y1="16" x2="0" y2="16" stroke="#6a8a9e" stroke-width="0.6" opacity="0.6"/>
  <!-- Bill highlight -->
  <line x1="-34" y1="15.6" x2="-4" y2="15.6" stroke="#b0c4d4" stroke-width="0.4" opacity="0.4"/>

  <!-- Gill slits -->
  <line x1="20" y1="12" x2="20" y2="21" stroke="#2e4a66" stroke-width="0.6" opacity="0.4"/>
  <line x1="23" y1="11" x2="23" y2="22" stroke="#2e4a66" stroke-width="0.5" opacity="0.3"/>

  <!-- Eye -->
  <ellipse cx="13" cy="14" rx="2.8" ry="2.4" fill="#ffe8cc" stroke="#333" stroke-width="0.7"/>
  <!-- Pupil -->
  <ellipse cx="12.7" cy="14" rx="1.5" ry="2" fill="#1a1a30"/>
  <!-- Glint -->
  <circle cx="13.2" cy="12.8" r="0.5" fill="white" opacity="0.7"/>
</svg>
